webifier:
  extensions:
    site:
      uses: webifier.standard
    markdown:
      uses: webifier.markdown
    notebook:
      uses: webifier.notebook
    theme:
      uses: webifier.theme
      switcher: true
      default: system
      # Custom themes can be added later with:
      # themes:
      #   - name: silly
      #     label: Silly
      #     css: assets/css/themes/silly.css
    analytics:
      uses: webifier.analytics.google
      measurement_id: G-TYRMXHZ5YH
    comments:
      uses: webifier.comments
      repo: webifier/comments
      issue_term: pathname
      issue_label: comments
      theme: github-light
      crossorigin: anonymous
    people:
      uses: webifier.people
    chapters:
      uses: webifier.chapters
favicon:
  href: /assets/images/webifier-logo.png
  type: image/png
