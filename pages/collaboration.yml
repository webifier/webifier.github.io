help:
  label: Help
  content: |
    Webifier is useful when it disappears into the workflow: add content,
    organize it, push to Git, and let the website update itself. Contributions
    that make that experience smoother are especially welcome.

    Good places to help:

    - Improve templates for documentation, notebooks, galleries, reports, and
      personal websites.
    - Add real examples that show how repositories can be organized.
    - Tighten the GitHub Action and local CLI experience.
    - Improve notebook rendering, asset handling, and content discovery.
    - Build extensions for reusable formats like course pages, academic sites,
      resumes, collections, and project galleries.
    - Test Webifier on existing repositories and report the rough edges.

    Feel free to reach out, open an issue, start a discussion, or send a pull
    request. Questions, rough notes, examples of what did or did not work, and
    early feedback are all welcome.

    Start with the [build repository](https://github.com/webifier/build), the
    [extensions repository](https://github.com/webifier/extensions), or the
    [website repository](https://github.com/webifier/webifier.github.io).

