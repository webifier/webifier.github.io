extending:
  label: Extending Resume
  content: |
    Override `experience.html` or `publications.html` for markup changes. For a
    new domain-specific CV format, package your own extension that registers a
    new renderer id such as `academic.experience` or `resume.timeline`, and ship
    its templates/assets in that package.
