title: People Extension
header:
  title: People Extension
  description: Profile cards for teams, collaborators, authors, labs, and project contributors.

overview:
  label: What It Provides
  content: |
    `webifier.people` registers `kind: people`. It renders a grid of profile
    cards with names, titles, affiliations, optional images, Markdown bios, tags,
    and links. Cards use local or remote images when provided, and fall back to
    initials so the layout still looks intentional without headshots.

    ```yaml
    config:
      webifier:
        extensions:
          site:
            uses: webifier.standard
          people:
            uses: webifier.people
    ```

yaml_example:
  label: People YAML
  content: |
    ```yaml
    team:
      kind: people
      label: People
      layout:
        min_width: 13rem
        max_width: 17rem
        gap: 0.9rem
        align: center
        density: comfortable
      card:
        align: center
      avatar:
        size: 4.5rem
      people:
        - name: Project Maintainer
          github: octocat
          title: Maintainer
          affiliation: Example Research Group
          tags: [Core, Releases]
          bio: |
            Keeps the extension stable, documented, and pleasant to reuse.
          links:
            - text: Website
              link: https://example.com
            - text: GitHub
              link: https://github.com/octocat
            - text: Notes
              link: https://example.com/notes
            - text: Email
              link: mailto:hello@example.com
        - name: Ada Lovelace
          initials: AL
          title: Mathematical collaborator
          affiliation: Analytical Engine Notes
          tags: [Computation, Notes]
          bio: Wrote about computation before computers were fashionable.
        - name: Grace Hopper
          title: Computer scientist
          affiliation: Compiler systems
          tags: [Compilers, Tooling]
          bio: No `initials` field here; Webifier derives `GH` from the name.
        - name: Design Partner
          github: github
          title: Interface reviewer
          affiliation: Example Design Circle
          tags: [Docs, Polish]
          bio: Uses a second GitHub avatar fallback, this time without extra links.
    ```

