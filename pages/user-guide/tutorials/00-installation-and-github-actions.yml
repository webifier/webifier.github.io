title: Installation and GitHub Actions
header:
  title: Installation and GitHub Actions
  description: Install Webifier, render locally, and automate publishing from GitHub Actions.

install:
  label: Install
  content: |
    Webifier is a Python build tool. Installing `webifier` also installs the
    first-party extensions package used by the default renderers.

    ```shell
    pip install webifier
    ```

    During local development in this repository, the packages may be installed
    from adjacent checkouts instead. Published users should use the package name.

minimal_config_source:
  label: YAML
  content: |
    A small site usually starts with `index.yml` and a `config` block that enables
    the default extensions.

    ```yaml
    title: My Project

    config:
      webifier:
        extensions:
          site:
            uses: webifier.standard
          markdown:
            uses: webifier.markdown
          notebook:
            uses: webifier.notebook
          search:
            uses: webifier.search
            content: true
            links: true
          theme:
            uses: webifier.theme
            default: system
            switcher: true

    intro:
      label: Overview
      content: |
        # My Project

        Notes, notebooks, and reports from the repository.
    ```

minimal_config_rendered:
  label: Overview
  content: |
