title: Renderer Catalog
header:
  title: Renderer Catalog
  description: The default renderers and first-party extensions shipped for Webifier sites.

overview:
  label: Renderers
  content: |
    A renderer decides how a YAML node or content file becomes HTML. The default
    extensions give you a practical site shell, Markdown and notebook pages,
    lists, sections, comments, people cards, chapters, themes, search, analytics,
    and resume-oriented blocks.

    The important pattern is composability: enable extensions in `config`, then
    use `kind` only when a section needs a renderer other than the default.

map:
  label: Map
  content: |
    - Default shell
      - [Page and Section Renderers](index=pages/user-guide/renderers/01-page-and-section-renderers.yml)
        - `page`, `content-page`, `section`, `freeform`
    - Content and links
      - [Content and Link Renderers](index=pages/user-guide/renderers/02-content-and-link-renderers.yml)
        - `markdown`, `links`, Markdown pages, notebook pages
    - Extension renderers
      - [Extension Renderers](index=pages/user-guide/renderers/03-extension-renderers.yml)
        - `chapters`, `people`, `comments`, `resume.experience`,
          `resume.publications`, search, theme, analytics
      - [Bundled Extensions](index=pages/user-guide/extensions/bundled.yml)
        - Install-time extensions, config examples, and a rendered notebook link

syntax:
  label: Syntax
  content: |
    ```yaml
    config:
      webifier:
        extensions:
          site:
            uses: webifier.standard
          markdown:
            uses: webifier.markdown
          notebook:
            uses: webifier.notebook
          chapters:
            uses: webifier.chapters

    outline:
      kind: chapters
      label: Outline
      content:
        - title: Build
          body: |
            Render from files.
    ```

    Breakdown:

    - `config.webifier.extensions`: enables installed extension instances.
    - local key such as `chapters`: your instance name.
    - `uses`: extension id.
    - `kind`: renderer name used by a YAML node.
    - renderer-specific keys: documented by the renderer page.

