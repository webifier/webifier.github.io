title: Extension Renderers
header:
  title: Extension Renderers
  description: First-party extension renderers, hooks, assets, and configuration options.

overview:
  label: Extensions
  content: |
    First-party extensions are normal Webifier extensions. They register
    renderers, content handlers, assets, config defaults, and hooks. A site only
    uses an extension when it is listed under `config.webifier.extensions`.

available:
  label: Available
  content: |
    ```yaml
    config:
      webifier:
        extensions:
          site:
            uses: webifier.standard
          markdown:
            uses: webifier.markdown
          notebook:
            uses: webifier.notebook
          search:
            uses: webifier.search
            content: true
            links: true
          theme:
            uses: webifier.theme
            default: system
            switcher: true
          comments:
            uses: webifier.comments
            repo: owner/repo
          people:
            uses: webifier.people
          chapters:
            uses: webifier.chapters
          resume:
            uses: webifier.resume
    ```

chapters:
  kind: chapters
  label: Chapters
  content:
    - title: What it renders
      body: |
        `kind: chapters` renders a list of chapter objects as an accordion.
    - title: Keys
      body: |
        Each chapter item uses `title` plus any child content keys. Child content
        is rendered recursively before it is placed in the accordion body.

people_source:
  label: People YAML
  content: |
    ```yaml
    team:
      kind: people
      label: Team
      content:
        - name: Ada Lovelace
          bio: |
            Wrote about computation.
          github: example
          contact:
            - text: Website
              link: https://example.com
    ```

comments:
  label: Comments
  content: |
    `kind: comments` renders an Utterances comments block. It can use global
    config from the `webifier.comments` extension or page-local values.

    ```yaml
    discussion:
      kind: comments
      label: Comments
      repo: owner/repo
      issue_term: pathname
      issue_label: comments
      theme: preferred-color-scheme
    ```

resume:
  label: Resume
  content: |
    `webifier.resume` ships resume-oriented section renderers:

    - `resume.experience`: experience/education/activity lists with compact,
      expanded, and inline layouts.
    - `resume.publications`: publication lists with authors, tags, and Markdown
      content.

    ```yaml
    work:
      kind: resume.experience
      label: Work
      defaults:
        compact: true
      example:
        heading:
          institution: Example Lab
          role: Research Engineer
          date: 2024
          location: Toronto, ON
        content: |
          - Built a reusable renderer for project websites.
    ```

theme_search_analytics:
  label: Site Features
  content: |
    Some extensions do not render a visible section by themselves:

    - `webifier.search`
      - `content`: include page body text in `search.json`.
      - `links`: include rendered links in `search.json`.
    - `webifier.theme`
      - `default`: `system`, `light`, `dark`, or a custom theme name.
      - `switcher`: show or hide the navbar switcher.
      - `themes`: custom theme descriptors with `name`, `label`, and `css`.
    - `webifier.analytics.google`
      - `measurement_id`: Google Analytics measurement id.

syntax:
  label: Syntax
  content: |
    Extension instance syntax:

    - local instance name: any key under `webifier.extensions`.
    - `uses`: installed extension id.
    - `override`: set `true` only when intentionally replacing prior registrations.
    - other keys: extension-specific configuration.

    Section renderer syntax:

    - `kind`: renderer id, such as `chapters`, `people`, `comments`,
      `resume.experience`, or `resume.publications`.
    - `label`: normal section label controls.
    - renderer-specific keys: documented by that renderer or extension.

