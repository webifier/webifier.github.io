title: Page and Section Renderers
header:
  title: Page and Section Renderers
  description: The default page shell, generated content page shell, section renderer, and freeform renderer.

page_renderer:
  label: Page
  content: |
    `webifier.standard` registers `page`, the default renderer for root YAML
    pages and linked YAML sub-pages.

    ```yaml
    title: Project Site

    header:
      title: Project Site
      description: Results and notes.

    nav:
      brand:
        text: Project Site
        link: /

    intro:
      label: Intro
      content: |
        # Welcome
        This ordinary key becomes a section.
    ```

    Page-level reserved keys:

    - `kind`: use a different page renderer.
    - `template`: use a specific page template.
    - `title`: browser title and fallback page title.
    - `header`: visible page header.
    - `nav`: navigation bar configuration.
    - `footer`: page footer configuration.
    - `meta`: HTML metadata.
    - `config`: page/site configuration.
    - `search`: search behavior.
    - `style`: inline page CSS.

section_source:
  label: YAML
  content: |
    `section` is the default renderer for YAML objects below the page. Its
    ordinary child keys are recursively rendered.

    ```yaml
    results:
      label:
        text: Results
        position: left
      defaults:
        label: false

      summary:
        content: |
          ### Summary
          The new model is smaller and faster.

      detail:
        content: |
          ### Detail
          The improvement is strongest on noisy examples.
    ```

results:
  label:
    text: Results
    position: left
  defaults:
    label: false

  summary:
    content: |
      ### Summary
      The new model is smaller and faster.

  detail:
    content: |
      ### Detail
      The improvement is strongest on noisy examples.

section_syntax:
  label: Syntax
  content: |
    Section keys:

    - `label`
      - string: label text.
      - `false`: hide the label.
      - object:
        - `text`: label text.
        - `position`: `left`, `top`, or `bottom`.
    - `kind`: renderer name, such as `chapters` or `resume.experience`.
    - `template`: Jinja template for the inside of this section.
    - `background`: section background image.
    - `style`: style data for templates that use it.
    - `defaults`: values applied to child YAML objects.
    - any other key: content, rendered recursively.

freeform:
  label: Freeform
  content: |
    `freeform` renders child strings without the standard section wrapper. Use it
    for one-off HTML or a custom block that should not get a label/card shell.

    ```yaml
    hero:
      kind: freeform
      body: |
        <div class="p-5 text-center">
          <h1>Custom block</h1>
        </div>
    ```

