title: Webifier User Guide
header:
  title: Webifier User Guide
  description: Start with repository files, then grow toward extension-defined page syntax, renderers, themes, and reusable formats.

core_idea:
  label: Core Idea
  content: |
    Webifier is built around a small idea: publishing should feel close to
    writing and committing files. You keep Markdown, notebooks, HTML files,
    PDFs, reports, and assets in Git. Webifier reads the page structure you
    describe and turns the reachable files into a static website.

    This guide is also a working example. The pages are ordinary Markdown and
    YAML files, and the website you are reading is generated from them.

    The important design point is that Webifier itself is intentionally small.
    Extensions teach it what page syntax means. When you enable the standard
    extension, keys like `header`, `nav`, `meta`, and `footer` become page
    controls. When you enable Markdown, notebooks, PDFs, comments, people cards,
    or a custom extension, those extensions add their own renderers, page
    config, hooks, templates, assets, and sometimes their own page-level keys.

    So the mental model is:

    - Start with one page, usually `index.yml`.
    - Enable the extensions that define the grammar you want to use.
    - Write visible sections as ordinary YAML keys in reading order.
    - Put behavior under `config`.
    - Link to Markdown, notebooks, PDFs, YAML pages, and assets.
    - Let Webifier follow those links and render the static site.

start:
  label: Start Here
  content: |
    These pages are the shortest path from an empty repository to a working
    Webifier site. Read them in order if you are setting up a project for the
    first time; each page starts with the idea and ends with the detailed syntax.

    - [Hello World Website](index=pages/user-guide/tutorials/00-hello-world.yml): create the smallest useful Webifier page from one YAML file.
    - [Installation and GitHub Actions](index=pages/user-guide/tutorials/00-installation-and-github-actions.yml): install the packages, render locally, and add a GitHub Actions workflow.
    - [YAML Pages and Sections](index=pages/user-guide/tutorials/01-yaml-pages-and-sections.yml): learn the top-to-bottom page model with rendered examples.
    - [Section Controls](index=pages/user-guide/tutorials/02-section-controls.yml): add labels, templates, defaults, and renderer dispatch.
    - [Links and Page Discovery](index=pages/user-guide/tutorials/03-links-and-page-discovery.yml): link Markdown, notebooks, YAML pages, and static assets.

default_workflow:
  label: Default Publishing Workflow
  content: |
    Use these pages once the first tutorial path makes sense. They explain the
    default site grammar, content files, and the config layer you will edit most
    often.

    - [Using the Default Site](md=pages/user-guide/01-default-site.md): understand how enabling `webifier.standard` gives you the default page grammar.
    - [Render and Automate](md=pages/user-guide/02-render-and-automate.md): run the build locally and wire it into repository publishing.
    - [Navigation and Pages](md=pages/user-guide/03-navigation-and-pages.md): configure site navigation and decide which pages belong in the guide.
    - [Publishing Content Files](md=pages/user-guide/04-content-files.md): publish Markdown, notebooks, HTML, PDFs, and assets from your repository.
    - [Configuration Basics](md=pages/user-guide/05-configuration.md): keep site-level defaults, page settings, and extension options in one place.

renderers:
  label: Extensions And Reuse
  content: |
    Extensions are where Webifier becomes reusable. The first-party extension
    pages show the available building blocks. The customization pages then show
    how to override templates, add renderers, and package repeatable site
    formats.

    - [Extensions Overview](index=pages/user-guide/extensions/index.yml): lifecycle, named instances, hooks, page config, and consumed page keys.
    - [Bundled Extensions](index=pages/user-guide/extensions/index.yml): standard pages, Markdown, notebooks, PDFs, chapters, people, resume, theme, comments, search, and analytics.
    - [Themes and Styles](md=pages/user-guide/06-themes.md): set defaults, switch themes, and prepare for custom visual systems.
    - [Template Overrides](md=pages/user-guide/07-template-overrides.md): replace specific templates without rewriting the whole site.
    - [Template-Only Renderers](md=pages/user-guide/08-template-renderers.md): add new rendering kinds from templates alone.
    - [Python Renderers and Resolvers](md=pages/user-guide/09-python-renderers-and-resolvers.md): plug in Python code when templates are not enough.
    - [Custom Extensions and Reusable Formats](md=pages/user-guide/10-reusable-formats.md): install custom extensions, update GitHub Actions, and package repeatable formats.
    - [Renderer / Kind System](md=pages/user-guide/reference/03-renderers.md): use this reference when you need the lower-level dispatch model.

reference:
  label: Reference
  content: |
    Use the reference pages when you need exact syntax, lifecycle details, or a
    deeper mental model for extending Webifier. These pages are intentionally
    more complete than the tutorials.

    - [Architecture Overview](md=pages/user-guide/reference/00-overview.md): see the core pieces and how extensions fit around them.
    - [YAML Syntax Specification](md=pages/user-guide/reference/01-yaml-syntax.md): check the supported YAML shapes and reserved keys.
    - [Resolver System](md=pages/user-guide/reference/02-resolvers.md): understand how links, files, and generated pages are discovered.
    - [Renderer / Kind System](md=pages/user-guide/reference/03-renderers.md): map `kind`, templates, and renderer dispatch.
    - [Extension and Customization Guide](md=pages/user-guide/reference/04-extension-guide.md): write extensions that register renderers, hooks, templates, and assets.
    - [Processing Pipeline](md=pages/user-guide/reference/05-processing-pipeline.md): follow the build lifecycle from config loading to output files.
