title: Webifier User Guide
header:
  title: Webifier User Guide
  description: Start with files in a repository, then grow toward renderers, extensions, themes, and reusable formats.

overview:
  label: Overview
  content: |
    Webifier is built around a small idea: useful project content should be easy
    to publish. You keep Markdown, notebooks, HTML files, PDFs, reports, and
    assets in Git. Webifier reads the structure you describe and turns those
    files into a static website.

    This guide is also a working example. The pages are ordinary Markdown and
    YAML files, and the website you are reading is generated from them.

